; ── Shared settings ──────────────────────────────
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7.3.1
    ayushsharma82/ElegantOTA@3.1.7

; ── ESP32-S3-N16R8 — USB (first flash) ──────────
[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
board_build.arduino.memory_type = qio_opi
board_upload.maximum_size = 16777216

; ── ESP32-S3-N16R8 — OTA ────────────────────────
[env:esp32s3-ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
board_build.arduino.memory_type = qio_opi
board_upload.maximum_size = 16777216
upload_protocol = espota
; OTA by mDNS name (recommended): set to this unit's device name + .local
; Previous fixed IP was 192.168.1.143
upload_port = soilmoisturelogger.local

; NOTE: ESP32-S3 is the target here — session storage relies on PSRAM,
; which the XIAO ESP32-C6 does not have, so C6 is not a supported build.
; The -DXIAO_C6 pin branch in src/main.cpp exists only for pattern parity.
